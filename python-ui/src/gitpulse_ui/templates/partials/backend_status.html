{% if backend_status %}
  <section class="notice notice-error backend-status">
    <div>
      <strong>{{ backend_status.title }}</strong>
      <p>{{ backend_status.message }}</p>
    </div>
    <div class="meta-stack">
      <div>
        <span class="label">API Base URL</span>
        <code>{{ backend_status.base_url }}</code>
      </div>
      <div>
        <span class="label">Recovery</span>
        <code>{{ backend_status.command }}</code>
      </div>
      <div>
        <span class="label">Override</span>
        <code>{{ backend_status.env_var }}</code>
      </div>
    </div>
  </section>
{% endif %}
