<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ heading }} · GitPulse</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='/app.css') }}">
    <script defer src="{{ request.url_for('static', path='/vendor/alpine.js') }}"></script>
    <script defer src="{{ request.url_for('static', path='/vendor/htmx.js') }}"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">GP</div>
          <div>
            <h1>GitPulse</h1>
            <p>Local-first git analytics</p>
          </div>
        </div>
        <nav class="nav" hx-boost="true">
          <a href="/" class="{% if active_nav == 'dashboard' %}active{% endif %}">Dashboard</a>
          <a href="/repositories" class="{% if active_nav == 'repositories' %}active{% endif %}">Repositories</a>
          <a href="/sessions" class="{% if active_nav == 'sessions' %}active{% endif %}">Sessions</a>
          <a href="/achievements" class="{% if active_nav == 'achievements' %}active{% endif %}">Achievements</a>
          <a href="/settings" class="{% if active_nav == 'settings' %}active{% endif %}">Settings</a>
        </nav>
      </aside>

      <main class="content" id="page-shell">
        <header class="page-header">
          <div>
            <p class="eyebrow">{{ eyebrow }}</p>
            <h2>{{ heading }}</h2>
            <p class="description">{{ description }}</p>
          </div>
        </header>

        {% include 'partials/flash.html' %}
        {% include 'partials/backend_status.html' %}

        {% if error %}
          <section class="notice notice-error">
            {{ error }}
          </section>
        {% endif %}

        <div class="stack">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>
  </body>
</html>
