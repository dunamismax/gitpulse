name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: gitpulse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: CLI build smoke
        run: go build ./cmd/gitpulse
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  python-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-ui
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Sync
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Format
        run: uv run ruff format --check .
      - name: Typecheck
        run: uv run pyright
      - name: Test
        run: uv run pytest
