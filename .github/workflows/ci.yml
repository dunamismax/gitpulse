name: ci

on:
  push:
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    env:
      GITPULSE_DATABASE__PATH: ${{ runner.temp }}/gitpulse-ci.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
      - name: CLI build smoke
        run: go build ./cmd/gitpulse
