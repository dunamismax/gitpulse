# GitPulse example configuration for the Go runtime.
# Copy this file to the platform config path reported by `gitpulse doctor`.
#
# Default config locations:
#   macOS:   ~/Library/Application Support/gitpulse/gitpulse.toml
#   Linux:   ~/.config/gitpulse/gitpulse.toml
#   Windows: %APPDATA%\gitpulse\gitpulse.toml
#
# Environment overrides use the GITPULSE_ prefix and double underscores for
# nesting, for example:
#   GITPULSE_DATABASE__PATH=/absolute/path/to/gitpulse.db
#   GITPULSE_SERVER__PORT=9000

[database]
# SQLite is the default store.
# If omitted, GitPulse uses the platform data directory:
#   macOS:   ~/Library/Application Support/gitpulse/data/gitpulse.db
#   Linux:   ~/.config/gitpulse/data/gitpulse.db
#   Windows: %APPDATA%\gitpulse\data\gitpulse.db
path = "/absolute/path/to/gitpulse.db"

[server]
host = "127.0.0.1"
port = 7467

[goals]
changed_lines_per_day = 250
commits_per_day = 3
focus_minutes_per_day = 90

[monitoring]
# GitPulse is manual-first today. These settings control explicit imports,
# rebuild sessionization, and repo discovery depth. Rescans do not import
# history or rebuild analytics for you.
import_days = 30
session_gap_minutes = 15
repo_discovery_depth = 5

[ui]
timezone = "UTC"
day_boundary_minutes = 0

[github]
enabled = false
verify_remote_pushes = false
# token = "ghp_your_token_here"

[patterns]
include = []
exclude = [
  ".git/**",
  "target/**",
  "node_modules/**",
  "build/**",
  "dist/**",
  ".next/**",
  "*.lock",
  "package-lock.json",
  "yarn.lock",
  "pnpm-lock.yaml",
  "go.sum",
  "*.png",
  "*.jpg",
  "*.jpeg",
  "*.gif",
  "*.svg",
  "*.ico",
  "*.webp",
  "*.mp4",
  "*.mov",
  "*.avi",
  "*.zip",
  "*.tar",
  "*.gz",
  "*.bz2",
  "*.7z",
  "*.woff",
  "*.woff2",
  "*.ttf",
  "*.eot",
  "*.wasm",
]

# Empty authors means "accept all authors" during history import.
# Add entries if you want commit metrics limited to your identities.
[[authors]]
email = "you@example.com"
name = "Your Name"
aliases = ["you@work.com"]
