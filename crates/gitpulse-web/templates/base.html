<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }} | GitPulse</title>
    <link rel="stylesheet" href="/assets/css/app.css" />
    <script src="/assets/js/htmx.min.js"></script>
    <script src="/assets/js/app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">GP</div>
          <div>
            <h1>GitPulse</h1>
            <p>Local-first git analytics</p>
          </div>
        </div>
        <nav class="nav">
          <a href="/" class="{% if active_nav == "dashboard" %}active{% endif %}">Dashboard</a>
          <a href="/repositories" class="{% if active_nav == "repositories" %}active{% endif %}">Repositories</a>
          <a href="/sessions" class="{% if active_nav == "sessions" %}active{% endif %}">Sessions</a>
          <a href="/achievements" class="{% if active_nav == "achievements" %}active{% endif %}">Achievements</a>
          <a href="/settings" class="{% if active_nav == "settings" %}active{% endif %}">Settings</a>
        </nav>
      </aside>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
