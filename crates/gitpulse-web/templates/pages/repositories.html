{% extends "base.html" %}
{% block content %}
<section class="page-head spread">
  <div>
    <p class="eyebrow">Tracked Targets</p>
    <h2>Repositories</h2>
    <p class="muted">Add a single repo or a parent folder. Nested repos are discovered and tracked individually.</p>
  </div>
  <form class="inline-form" method="post" action="/repositories/add">
    <input type="text" name="path" placeholder="/Users/you/code" required />
    <button type="button" class="secondary" data-pick-folder>Pick Folder</button>
    <button type="submit">Add Target</button>
  </form>
</section>

<section class="panel">
  <header class="panel-head">
    <h3>All Repositories</h3>
    <span class="chip">{{ cards.len() }} total</span>
  </header>
  {% include "partials/repo_cards.html" %}
</section>
{% endblock %}
