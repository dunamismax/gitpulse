<section class="grid six">
  <article class="stat-card"><span>Live Lines</span><strong>{{ today.live_lines }}</strong></article>
  <article class="stat-card"><span>Staged Lines</span><strong>{{ today.staged_lines }}</strong></article>
  <article class="stat-card"><span>Commits Today</span><strong>{{ today.commits_today }}</strong></article>
  <article class="stat-card"><span>Pushes Today</span><strong>{{ today.pushes_today }}</strong></article>
  <article class="stat-card"><span>Active Session</span><strong>{{ today.active_session_minutes }} min</strong></article>
  <article class="stat-card"><span>Streak / Score</span><strong>{{ today.streak_days }} / {{ today.today_score }}</strong></article>
</section>
