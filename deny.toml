[graph]
all-features = true
targets = [{ triple = "aarch64-apple-darwin" }, { triple = "x86_64-unknown-linux-gnu" }]

[advisories]
version = 2
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2020-0163", reason = "Inherited through `tokei`; no maintained replacement is available without replacing the repo-size implementation." },
    { id = "RUSTSEC-2024-0370", reason = "Inherited through the current Tauri GTK stack on Linux; remove when upstream desktop dependencies move off `proc-macro-error`." },
