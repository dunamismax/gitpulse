services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gitpulse}
      POSTGRES_USER: ${POSTGRES_USER:-gitpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gitpulse}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    image: oven/bun:1.3.10
    working_dir: /app
    command:
      - sh
      - -lc
      - bun install && cd apps/api && bun run start
    environment:
      GITPULSE_API_HOST: 0.0.0.0
      GITPULSE_API_PORT: 3001
      GITPULSE_DATABASE_URL: postgres://${POSTGRES_USER:-gitpulse}:${POSTGRES_PASSWORD:-gitpulse}@postgres:5432/${POSTGRES_DB:-gitpulse}
    volumes:
      - .:/app
      - api-node_modules:/app/node_modules
    depends_on:
      - postgres

  web:
    image: oven/bun:1.3.10
    working_dir: /app
    command:
      - sh
      - -lc
      - >-
        bun install &&
        export ESBUILD_BINARY_PATH=$(find /app/node_modules -path '*@esbuild+linux-*@0.25.12*/node_modules/@esbuild/*/bin/esbuild' | head -n 1) &&
        cd apps/web &&
        bun run build &&
        bun run start
    environment:
      GITPULSE_WEB_HOST: 0.0.0.0
      GITPULSE_WEB_PORT: 4321
      GITPULSE_PUBLIC_APP_NAME: GitPulse vNext
      GITPULSE_PUBLIC_API_BASE_PATH: /api
      GITPULSE_PUBLIC_ORIGIN: http://127.0.0.1:7467
      GITPULSE_INTERNAL_API_ORIGIN: http://api:3001
    volumes:
      - .:/app
      - web-node_modules:/app/node_modules
    depends_on:
      - api

  caddy:
    image: caddy:2.10.2-alpine
    ports:
      - '7467:80'
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
      - api

volumes:
  postgres-data:
  api-node_modules:
  web-node_modules:
