services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gitpulse}
      POSTGRES_USER: ${POSTGRES_USER:-gitpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gitpulse}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-gitpulse} -d ${POSTGRES_DB:-gitpulse}
      interval: 2s
      timeout: 5s
      retries: 15
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    image: oven/bun:1.3.10
    working_dir: /app
    command:
      - sh
      - -lc
      - bun install --frozen-lockfile && bun run migrate:vnext && cd apps/api && bun run start
    environment:
      GITPULSE_API_HOST: 0.0.0.0
      GITPULSE_API_PORT: 3001
      GITPULSE_DATABASE_URL: postgres://${POSTGRES_USER:-gitpulse}:${POSTGRES_PASSWORD:-gitpulse}@postgres:5432/${POSTGRES_DB:-gitpulse}
    volumes:
      - .:/app
      - api-node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: oven/bun:1.3.10
    working_dir: /app
    command:
      - sh
      - -lc
      - bun install --frozen-lockfile && cd apps/web && bun run build && HOST=0.0.0.0 PORT=4321 node dist/server/entry.mjs
    environment:
      GITPULSE_WEB_HOST: 0.0.0.0
      GITPULSE_WEB_PORT: 4321
      GITPULSE_PUBLIC_APP_NAME: GitPulse vNext
      GITPULSE_PUBLIC_API_BASE_PATH: /api
      GITPULSE_PUBLIC_ORIGIN: http://127.0.0.1:7467
      GITPULSE_INTERNAL_API_ORIGIN: http://api:3001
    volumes:
      - .:/app
      - web-node_modules:/app/node_modules
    depends_on:
      - api

  caddy:
    image: caddy:2.10.2-alpine
    ports:
      - '7467:80'
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
      - api

volumes:
  postgres-data:
  api-node_modules:
  web-node_modules:
